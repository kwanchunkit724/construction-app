<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<title>CK工程 — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#020617}
  .sq{position:relative;width:1080px;height:1080px;overflow:hidden;background:#f97316;
    font-family:'Poppins','Microsoft JhengHei','PingFang HK',sans-serif;color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .grid{position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.10) 2px,transparent 2px),linear-gradient(90deg,rgba(255,255,255,.10) 2px,transparent 2px);
    background-size:90px 90px}
  .ck{position:relative;font-weight:800;font-size:380px;line-height:.9;letter-spacing:-8px;
    text-shadow:0 20px 60px rgba(0,0,0,.25)}
  .name{position:relative;font-weight:800;font-size:120px;margin-top:10px}
  .tag{position:relative;font-weight:700;font-size:40px;margin-top:24px;opacity:.92}
  .bar{position:absolute;left:0;right:0;bottom:0;height:24px;background:#0b1220}
</style>
</head>
<body>
  <div class="sq">
    <div class="grid"></div>
    <div class="ck">CK</div>
    <div class="name">工程</div>
    <div class="tag">建築工程管理 app</div>
    <div class="bar"></div>
  </div>
</body>
</html>
