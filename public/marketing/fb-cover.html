<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<title>CK工程 — FB Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#020617; }
  /* Facebook cover safe size; screenshot this card. */
  .cover {
    position:relative; width:1640px; height:624px; overflow:hidden;
    background:#0b1220;
    font-family:'Poppins','Microsoft JhengHei','PingFang HK',sans-serif;
    color:#fff;
  }
  .grid { position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(148,163,184,.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,163,184,.08) 1px, transparent 1px);
    background-size:42px 42px; }
  .glow { position:absolute; top:-180px; right:-120px; width:640px; height:640px;
    border-radius:50%; background:rgba(249,115,22,.22); filter:blur(140px); }
  .hazard { position:absolute; left:0; right:0; bottom:0; height:14px;
    background:repeating-linear-gradient(45deg,#f97316 0 18px,#0b1220 18px 36px); }
  .pad { position:relative; padding:90px 110px; }
  .row { display:flex; align-items:center; gap:26px; }
  .logo { width:104px; height:104px; border-radius:24px; background:#f97316;
    display:grid; place-items:center; font-weight:800; font-size:52px;
    box-shadow:0 18px 50px -12px rgba(249,115,22,.7); }
  .brand { font-weight:800; font-size:60px; letter-spacing:-1px; }
  .sub { color:#94a3b8; font-size:24px; margin-top:6px; font-weight:600; }
  .tag { margin-top:48px; font-weight:800; font-size:78px; line-height:1.05; letter-spacing:-1px; }
  .tag .o { color:#f97316; }
  .strip { margin-top:40px; display:inline-flex; align-items:center; gap:18px;
    font-size:24px; color:#cbd5e1; font-weight:600; }
  .pill { background:rgba(249,115,22,.12); border:1px solid rgba(249,115,22,.35);
    color:#fdba74; padding:8px 18px; border-radius:999px; font-size:22px; }
  .dot { width:8px;height:8px;border-radius:50%;background:#f97316; }
</style>
</head>
<body>
  <div class="cover">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="pad">
      <div class="row">
        <div class="logo">CK</div>
        <div>
          <div class="brand">CK工程</div>
          <div class="sub">建築工程管理 · Construction App</div>
        </div>
      </div>
      <div class="tag">取代地盤嘅<br><span class="o">WhatsApp + Excel + 紙簿</span></div>
      <div class="strip">
        <span class="pill">iOS App Store 已上架</span>
        <span class="dot"></span> 1 個月免費試用
        <span class="dot"></span> 判頭 · 工程師 · PM 一個 app
      </div>
    </div>
    <div class="hazard"></div>
  </div>
</body>
</html>
