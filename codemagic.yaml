workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.kwanchunkit.constructionapp"
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        TEAM_ID: "C22JSRYW54"
      node: latest

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set bundle version from build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$BUNDLE_ID" || echo 0)
          BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Fetch App Store signing files
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key /tmp/cert_key.pem
          keychain add-certificates

      - name: Archive app
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          CERT_IDENTITY=$(security find-identity -v -p codesigning | grep -E "Apple Distribution|iPhone Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Profile UUID: $PROFILE_UUID"
          echo "Certificate: $CERT_IDENTITY"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="$CERT_IDENTITY" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key><string>$PROFILE_UUID</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  ios-testflight:
    name: iOS TestFlight (Quick Test Build)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      groups:
