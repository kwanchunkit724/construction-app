      - name: Archive app
        script: |
          KEY_PATH="/tmp/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            -destination "generic/platform=iOS" \
