workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.kwanchunkit.constructionapp"
        XCODE_SCHEME: "App"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        TEAM_ID: "C22JSRYW54"
        VITE_SUPABASE_URL: "https://syyntodkvexkbpjrskjj.supabase.co"
        VITE_SUPABASE_ANON_KEY: "sb_publishable_BHKTjGCKkot6GVa2M6BCMQ_0qBAl1jP"
      node: latest

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Check bundle size
        script: node scripts/check-bundle-size.cjs

      - name: Purge stale build outputs (anti-cache)
        # Codemagic mac_mini_m2 persistent runners can keep stale dist/ +
        # ios/App/App/public/ between builds. Wipe so each build refreshes.
        script: |
          rm -rf dist
          rm -rf ios/App/App/public
          npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Verify packaged bundle matches fresh dist
        script: |
          DIST_INDEX=$(grep -oE 'index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          PACK_INDEX=$(grep -oE 'index-[A-Za-z0-9_-]+\.js' ios/App/App/public/index.html | head -1)
          echo "dist/ main bundle:       $DIST_INDEX"
          echo "ios packaged bundle:     $PACK_INDEX"
          if [ "$DIST_INDEX" != "$PACK_INDEX" ]; then
            echo "ERROR: packaged bundle is stale; cap sync did not refresh ios/App/App/public"
            exit 1
          fi

      - name: Set bundle version from build number
        script: |
          agvtool new-version -all "$(date +%s)"
          # Bump marketing version (CFBundleShortVersionString) too — App Store
          # Connect rejects re-uploading the same MARKETING_VERSION once a build
          # has been approved. Derive monotonic 1.0.<BUILD_NUMBER> per CI run.
          agvtool new-marketing-version "1.1"
        working_directory: ios/App

      - name: Fetch App Store signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY"
          keychain add-certificates
          xcode-project use-profiles

      - name: Archive app
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            archive \
            -destination "generic/platform=iOS" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          PROFILE_UUID=$(security cms -D -i /tmp/App.xcarchive/Products/Applications/App.app/embedded.mobileprovision | plutil -extract UUID raw -)
          echo "Exporting with profile UUID: $PROFILE_UUID"
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key><string>$PROFILE_UUID</string>
            </dict>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

