# OpenRouter Tokyo relay — pinned to nrt so OpenRouter sees a Japan egress IP
# (Supabase Edge egress is geo-blocked: 403 provider Terms of Service).
app = "ck-or-relay-nrt"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  # Scale to zero when idle; first request after idle cold-starts in nrt (~1-2s).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
